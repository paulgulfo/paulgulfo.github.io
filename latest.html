<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Latest Project — Paul Gulfo</title>
    <meta name="description" content="Latest projects by Paul Gulfo." />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="Contact.css">
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="logo">PG</div>
        <div>
          <div style="font-weight:700">Paul Gulfo</div>
          <div style="font-size:12px;color:var(--muted)">Graphic Designer</div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Our Service</a>
        <a href="latest.html">Latest Project</a>
        <a href="contact.html">Contact Me</a>
      </nav>
      <div class="social">
        <a href="https://facebook.com/paulgulfo" target="_blank" rel="noopener">Facebook</a>
        <a href="https://instagram.com/paulgulfo" target="_blank" rel="noopener">Instagram</a>
        <a href="mailto:hello@paulgulfo.com">Email</a>
      </div>
    </header>

    <main class="container">
      <section class="portfolio" style="margin-top:28px">
        <h2 style="margin:8px 0 12px">Latest Project</h2>
        <div class="grid" id="grid">
          <!-- Six projects using SVG assets -->
          <div class="item" tabindex="0" data-title="Arc Identity" data-desc="Full brand system for Studio Arc" data-image="assets/img1.svg"> 
            <img class="thumb" src="assets/img1.svg" alt="Arc Identity">
            <div class="meta"><div class="title">Arc Identity</div><div class="sub">Branding</div></div>
          </div>

          <div class="item" tabindex="0" data-title="Paper Box" data-desc="Packaging design for Paper & Co" data-image="assets/img2.svg">
            <img class="thumb" src="assets/img2.svg" alt="Paper Box">
            <div class="meta"><div class="title">Paper Box</div><div class="sub">Packaging</div></div>
          </div>

          <div class="item" tabindex="0" data-title="Local Fest Poster" data-desc="Illustrated poster for Local Fest" data-image="assets/img3.svg">
            <img class="thumb" src="assets/img3.svg" alt="Local Fest Poster">
            <div class="meta"><div class="title">Local Fest</div><div class="sub">Poster</div></div>
          </div>

          <div class="item" tabindex="0" data-title="Cafe Menu" data-desc="Editorial layout and menu design" data-image="assets/img4.svg">
            <img class="thumb" src="assets/img4.svg" alt="Cafe Menu">
            <div class="meta"><div class="title">Cafe Menu</div><div class="sub">Editorial</div></div>
          </div>

          <div class="item" tabindex="0" data-title="Neon Concept" data-desc="Concept art & neon style graphics" data-image="assets/img5.svg">
            <img class="thumb" src="assets/img5.svg" alt="Neon Concept">
            <div class="meta"><div class="title">Neon Concept</div><div class="sub">Concept</div></div>
          </div>

          <div class="item" tabindex="0" data-title="Editorial Spread" data-desc="Magazine layout and illustration" data-image="assets/img6.svg">
            <img class="thumb" src="assets/img6.svg" alt="Editorial Spread">
            <div class="meta"><div class="title">Editorial Spread</div><div class="sub">Illustration</div></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div>&copy; <span id="year"></span> Paul Gulfo — Made with attention to detail.</div>
    </footer>

    <!-- Lightweight lightbox modal -->
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal-content" role="document">
        <div class="modal-header">
          <div>
            <div id="m-title" style="font-weight:700"></div>
            <div id="m-desc" style="font-size:13px;color:var(--muted)"></div>
          </div>
          <button id="m-close" aria-label="Close" style="background:transparent;border:0;color:var(--muted);font-weight:700;cursor:pointer">✕</button>
        </div>
          <img id="m-image" class="modal-image" role="img" aria-label="Project preview" alt="Project preview">
      </div>
    </div>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
      const items = Array.from(document.querySelectorAll('.item'));
      const modal = document.getElementById('modal');
      const mImage = document.getElementById('m-image');
      const mTitle = document.getElementById('m-title');
      const mDesc = document.getElementById('m-desc');
      const mClose = document.getElementById('m-close');

      function openModal(item){
        const title = item.dataset.title || '';
        const desc = item.dataset.desc || '';
        const image = item.dataset.image || '';
        mTitle.textContent = title;
        mDesc.textContent = desc;
        if (mImage.tagName === 'IMG'){
          mImage.src = image;
          mImage.alt = title + ' — preview';
        } else {
          mImage.style.background = image;
        }
        modal.setAttribute('open','');
        modal.setAttribute('aria-hidden','false');
      }

      function closeModal(){
        modal.removeAttribute('open');
        modal.setAttribute('aria-hidden','true');
      }

      items.forEach(it=>{
        it.addEventListener('click',()=>openModal(it));
        it.addEventListener('keydown', e=>{ if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(it); } });
      });

      mClose.addEventListener('click', closeModal);
      modal.addEventListener('click', (e)=>{ if(e.target === modal) closeModal(); });
      document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeModal(); });
    </script>
  </body>
</html>

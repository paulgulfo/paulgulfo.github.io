<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>All Branding Projects - Design Studio</title>
  <link rel="stylesheet" href="home.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f0f10;--card:#111;--muted:#cfcfcf}
    body{font-family:Inter,system-ui,Arial;background:var(--bg);color:#fff;margin:0}
    .navbar{padding:18px 5%;display:flex;align-items:center}
    .logo{color:#fff;text-decoration:none;font-weight:700}
    .hero{padding:80px 5% 30px;text-align:center}
    .hero h1{font-size:clamp(2rem,5vw,3.5rem);margin:0}
    .carousel{position:relative;margin:2rem auto;max-width:1100px;overflow:visible;padding:40px 0}
    .slides{display:flex;gap:28px;transition:transform .45s cubic-bezier(.2,.9,.3,1);touch-action:pan-y}
    .slide{min-width:320px;height:420px;border-radius:18px;background:var(--card);overflow:hidden;flex:0 0 auto;position:relative;box-shadow:0 10px 30px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center}
    .slide img{width:100%;height:100%;object-fit:cover;display:block;transform:translateY(0);transition:transform .6s ease}
    .slide.floating img{transform:translateY(-18px) scale(1.03)}
    .controls{display:flex;justify-content:center;gap:12px;margin-top:18px}
    .dot{width:12px;height:12px;border-radius:50%;background:#333}
    .dot.active{background:red}
    @media(max-width:720px){.slide{min-width:260px;height:320px}}
  </style>
</head>
<body>
  <nav class="navbar"><a href="index.html" class="logo">Design<span>Studio</span></a></nav>
  <section class="hero">
    <h1>All Branding Projects</h1>
    <p style="color:var(--muted);max-width:720px;margin:8px auto">Swipe or drag the gallery — each image gently floats on each swipe.</p>
  </section>

  <main class="carousel" aria-label="Branding gallery">
    <div id="slides" class="slides">
      <div class="slide"><img src="6.png" alt="Streetwear Collection"></div>
      <div class="slide"><img src="3.jpg" alt="Startup Identity"></div>
      <div class="slide"><img src="3.jpg" alt="Creative Agency Brand"></div>
      <div class="slide"><img src="6.png" alt="Packaging Design"></div>
      <div class="slide"><img src="3.jpg" alt="Logo Set"></div>
    </div>
    <div class="controls" id="dots"></div>
  </main>

  <footer style="text-align:center;padding:40px 5%;color:var(--muted)">&copy; 2026 Paul Gulfo. All rights reserved.</footer>

  <script>
    const slidesEl = document.getElementById('slides');
    const slides = Array.from(document.querySelectorAll('.slide'));
    const dotsEl = document.getElementById('dots');
    let index = 0, startX=0, currentX=0, dragging=false;

    // create dots
    slides.forEach((_,i)=>{const d=document.createElement('button');d.className='dot';d.onclick=()=>goTo(i);dotsEl.appendChild(d)});
    const dots = Array.from(dotsEl.children);

    function update(){
      const gap = 28; const slideW = slides[0].getBoundingClientRect().width;
      const offset = -(slideW + gap) * index;
      slidesEl.style.transform = `translateX(${offset}px)`;
      dots.forEach((d,i)=>d.classList.toggle('active', i===index));
      slides.forEach((s,i)=>s.classList.toggle('floating', i===index));
    }

    function goTo(i){ index = Math.max(0, Math.min(slides.length-1, i)); update(); }

    // touch / mouse drag
    function onStart(e){ dragging=true; startX = (e.touches ? e.touches[0].clientX : e.clientX); slidesEl.style.transition='none'; }
    function onMove(e){ if(!dragging) return; currentX = (e.touches ? e.touches[0].clientX : e.clientX); const dx = currentX - startX; slidesEl.style.transform = `translateX(${-(slides[0].getBoundingClientRect().width + 28) * index + dx}px)`; }
    function onEnd(e){ if(!dragging) return; dragging=false; slidesEl.style.transition='transform .45s cubic-bezier(.2,.9,.3,1)'; const dx = currentX - startX; if(dx < -60) goTo(index+1); else if(dx > 60) goTo(index-1); else update(); }

    slidesEl.addEventListener('touchstart', onStart, {passive:true});
    slidesEl.addEventListener('touchmove', onMove, {passive:true});
    slidesEl.addEventListener('touchend', onEnd);
    slidesEl.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);

    // keyboard accessibility
    window.addEventListener('keydown', e=>{ if(e.key==='ArrowRight') goTo(index+1); if(e.key==='ArrowLeft') goTo(index-1); });

    // initial
    update();
    window.addEventListener('resize', update);
  </script>
</body>
</html>

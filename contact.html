<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact — Paul Gulfo</title>
    <meta name="description" content="Contact Paul Gulfo." />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="Contact.css">
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="logo">PG</div>
        <div>
          <div style="font-weight:700">Paul Gulfo</div>
          <div style="font-size:12px;color:var(--muted)">Graphic Designer</div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Our Service</a>
        <a href="latest.html">Latest Project</a>
        <a href="contact.html">Contact Me</a>
      </nav>
      <div class="social">
        <a href="https://facebook.com/paulgulfo" target="_blank" rel="noopener">Facebook</a>
        <a href="https://instagram.com/paulgulfo" target="_blank" rel="noopener">Instagram</a>
        <a href="mailto:hello@paulgulfo.com">Email</a>
      </div>
    </header>

    <main class="container">
      <section style="margin-top:32px">
        <h2>Contact Me</h2>
        <p style="color:var(--muted);max-width:720px">Fill out the form and I'll get back to you.</p>
        <form id="contact-form" class="contact-form" action="assets/index.php" method="post" style="margin-top:16px;max-width:720px;display:grid;gap:10px">
          <label>
            Full name
            <input type="text" id="fullname" name="fullname" placeholder="Your full name" required>
          </label>
          <label>
            Mobile number
            <input type="tel" id="mobile" name="mobile" placeholder="+63 9xx xxx xxxx" required>
          </label>
          <!-- Honeypot field (hidden) to trap bots -->
          <label style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden">
            Leave this field empty
            <input type="text" name="hp" tabindex="-1" autocomplete="off">
          </label>
          <label>
            Your message
            <textarea id="message" name="message" rows="6" placeholder="Tell me about your project" required></textarea>
          </label>
          <div class="contact-actions">
            <button type="submit" class="btn">Send message</button>
            <div id="form-note"></div>
          </div>
        </form>
      </section>
    </main>

    <footer>
      <div>&copy; <span id="year"></span> Paul Gulfo — Made with attention to detail.</div>
    </footer>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();

      // Contact form handler copied from original index.html
      const form = document.getElementById('contact-form');
      const formNote = document.getElementById('form-note');
      if(form){
        form.addEventListener('submit', async (e)=>{
          e.preventDefault();
          const name = document.getElementById('fullname').value.trim();
          const mobile = document.getElementById('mobile').value.trim();
          const msg = document.getElementById('message').value.trim();
          if(!name || !mobile || !msg){
            formNote.textContent = 'Please complete all fields.';
            return;
          }

          const action = (form.getAttribute('action') || '').trim();
          if (action) {
            formNote.textContent = 'Sending...';
            const data = new FormData(form);
            if(!data.has('hp')) data.append('hp','');
            try{
              const res = await fetch(action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
              const json = await res.json();
              if(res.ok && json && json.success){
                formNote.classList.remove('form-error');
                formNote.classList.add('form-success');
                formNote.textContent = json.message || 'Message sent.';
                form.reset();
              } else {
                formNote.classList.remove('form-success');
                formNote.classList.add('form-error');
                formNote.textContent = (json && json.message) ? json.message : 'Failed to send message.';
              }
            } catch(err){
              formNote.classList.remove('form-success');
              formNote.classList.add('form-error');
              formNote.textContent = 'Network error. Try again.';
            }
            setTimeout(()=>{ formNote.textContent = ''; formNote.classList.remove('form-success','form-error'); }, 4500);
            return;
          }

          const to = 'hello@paulgulfo.com';
          const subject = encodeURIComponent('Website contact from ' + name);
          const body = encodeURIComponent('Name: ' + name + '\nMobile: ' + mobile + '\n\nMessage:\n' + msg);
          window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
          formNote.textContent = 'Opening your mail client...';
          setTimeout(()=>{ formNote.textContent = ''; form.reset(); }, 3000);
        });
      }
    </script>
  </body>
</html>

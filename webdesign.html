<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Design Projects - Design Studio</title>

<link rel="stylesheet" href="home.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
/* HERO */
.portfolio-hero {
    padding: 140px 5% 60px;
    text-align: center;
}
.portfolio-hero h1 {
    font-size: clamp(3rem, 6vw, 5rem);
    background: linear-gradient(to right, #fff, #ff0000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 1rem;
}
.portfolio-hero p {
    font-size: 1.2rem;
    color: var(--text-muted);
    max-width: 600px;
    margin: 0 auto;
}

/* FILTER BUTTONS */
.filter-container {
    padding: 2rem 5%;
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
}
.filter-btn {
    padding: 0.8rem 1.5rem;
    background: var(--card-bg);
    border: 1px solid #333;
    border-radius: 50px;
    color: var(--text-muted);
    text-decoration: none;
    transition: all 0.3s ease;
}
.filter-btn:hover,
.filter-btn.active {
    background: red;
    color: #fff;
    border-color: red;
}

/* PROJECT GRID */
.portfolio-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    padding: 0 5% 5rem;
}

/* Tablet */
@media(max-width:1024px){
    .portfolio-grid{
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Mobile */
@media(max-width:768px){
    .portfolio-grid{
        grid-template-columns: 1fr;
    }
}

/* PROJECT CARD */
.project-card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    opacity: 0;
    transform: translateY(40px);
    transition: transform 0.4s ease, box-shadow 0.4s ease, opacity 0.6s ease;
}
.project-card.show {
    opacity: 1;
    transform: translateY(0);
}
.project-card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 20px 50px rgba(255,0,0,0.4);
}

/* IMAGE */
.project-image {
    width: 100%;
    height: 300px;
    object-fit: cover;
    transition: transform 0.5s ease;
}
.project-card:hover .project-image {
    transform: scale(1.1);
}

/* OVERLAY */
.project-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 1.5rem;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}
.project-info h3{
    margin-bottom:0.5rem;
    color:#fff;
}
.project-info span{
    color: red;
    font-size:0.9rem;
}

/* CTA BUTTON */
.btn-primary {
    display:inline-block;
    padding:0.8rem 2rem;
    background:red;
    color:#fff;
    border-radius:50px;
    text-decoration:none;
    transition:transform 0.3s;
}
.btn-primary:hover{
    transform:scale(1.05);
}

/* AUDIO BUTTON */
.audio-control {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 70px;
    height: 70px;
    background: red;
    border-radius: 50%;
    font-size: 32px;
    color: white;
    cursor: pointer;
    border: none;
    transition: transform 0.3s ease;
}
.audio-control:hover{
    transform: scale(1.2);
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="navbar">
    <a href="index.html" class="logo">Design<span>Studio</span></a>
</nav>

<!-- HERO -->
<section class="portfolio-hero">
    <h1>Web Design Projects</h1>
    <p>Explore our responsive, modern, and user-focused website designs.</p>
</section>

<!-- FILTER -->
<div class="filter-container">
    <a href="Portfolio.html" class="filter-btn active">All</a>
    <a href="branding.html" class="filter-btn">Branding</a>
    <a href="webdesign.html" class="filter-btn">Web Design</a>
    <a href="ui.html" class="filter-btn">UI/UX</a>
</div>

<!-- PROJECT GRID -->
<section class="portfolio-grid">
    <a href="project.html" class="project-card">
        <img src="1.jpg" class="project-image">
        <div class="project-overlay">
            <div class="project-info">
                <h3>Corporate Website</h3>
                <span>Web Design</span>
            </div>
        </div>
    </a>
    <a href="project.html" class="project-card">
        <img src="1.jpg" class="project-image">
        <div class="project-overlay">
            <div class="project-info">
                <h3>E-Commerce Store</h3>
                <span>Web Design</span>
            </div>
        </div>
    </a>
    <a href="project.html" class="project-card">
        <img src="1.jpg" class="project-image">
        <div class="project-overlay">
            <div class="project-info">
                <h3>Landing Page</h3>
                <span>Web Design</span>
            </div>
        </div>
    </a>
</section>

<!-- CTA -->
<section class="cta-section">
    <center><a href="contact.html" class="btn-primary">Get a Quote</a></center>
</section>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 Paul Gulfo. All rights reserved.</p>
</footer>

<!-- AUDIO -->
<audio id="backgroundAudio" loop>
    <source src="3LoLorems.mp3" type="audio/mpeg">
</audio>
<button class="audio-control" id="audioControl">🎵</button>

<script>
// Scroll reveal animation
const cards = document.querySelectorAll('.project-card');
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting) entry.target.classList.add('show');
    });
},{ threshold: 0.3 });
cards.forEach(card => observer.observe(card));

// Audio control
const audio = document.getElementById('backgroundAudio');
const btn = document.getElementById('audioControl');
let playing = sessionStorage.getItem('audioPlaying') === 'true';
function update(){ btn.textContent = playing ? '⏸' : '🎵'; }
update();
window.onload = () => { if(playing) audio.play().catch(()=>{}); };
btn.onclick = () => {
    if(playing) audio.pause(); else audio.play().catch(()=>{});
    playing = !playing;
    sessionStorage.setItem('audioPlaying', playing);
    update();
};
</script>

</body>
</html>
